<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3am.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* 定義主題 CSS 變數 */
        :root {
            --bg-color: #F6F5F2; 
            --text-color: #000000; 
            --nav-bg: white; 
            --nav-hover-bg: #000000; 
            --nav-hover-text: white; 
            --fog-gradient: radial-gradient(circle at center, rgba(246, 245, 242, 0.95) 0%, rgba(246, 245, 242, 0.6) 20%, transparent 60%);
            --logo-filter: brightness(0); 
            --icon-filter: brightness(0);
            --icon-hover-filter: brightness(0) invert(1);
        }

        body.dark {
            --bg-color: #000000; 
            --text-color: #ffffff; 
            --nav-bg: #1a1a1a; 
            --nav-hover-bg: #ffffff; 
            --nav-hover-text: #000000; 
            /* 為 Dark mode 加入暗黑霧，令白字更清晰，同時過渡更自然 */
            --fog-gradient: radial-gradient(circle at center, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.4) 30%, transparent 60%); 
            --logo-filter: brightness(0) invert(1); 
            --icon-filter: brightness(0) invert(1);
            --icon-hover-filter: brightness(0);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            transition: color 0.4s ease; 
        }

        /* === 鎖定機制 === 
           確保圓圈擴散期間，真正嘅底色唔會因為 body.dark 提早觸發而瞬間閃黑/閃白 
        */
        body.theme-transitioning.to-dark {
            background-color: #F6F5F2 !important;
        }
        body.theme-transitioning.to-light {
            background-color: #000000 !important;
        }

        /* 擴散層：負責繪製放大嘅新背景色 */
        #theme-reveal-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0; 
            clip-path: circle(0px at var(--x, 50%) var(--y, 50%));
            will-change: clip-path;
        }

        /* 當啟動擴散時，播放動畫（時間加長至 1.5s，並使用完美嘅先慢後快曲線） */
        #theme-reveal-layer.expanding {
            animation: revealTheme 1.5s cubic-bezier(0.45, 0, 0.15, 1) forwards;
        }

        @keyframes revealTheme {
            0% { clip-path: circle(0px at var(--x) var(--y)); }
            100% { clip-path: circle(var(--radius) at var(--x) var(--y)); }
        }

        /* 確保其他 UI 元素都會順滑轉色 */
        .nav-pill, .dynamic-logo, .theme-toggle-btn img, .hero-title {
            transition: all 0.4s ease;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            perspective: 1000px; 
            transform-style: preserve-3d;
            z-index: 1; 
        }

        .image-plane {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
            transform-style: preserve-3d;
            will-change: transform, opacity;
            object-fit: cover;
            width: 338px; 
            height: 254px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            border-radius: 4px; 
        }

        .center-fade-mask {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 25; 
            background: var(--fog-gradient);
            transition: opacity 0.3s ease, background 0.4s ease; 
        }
        
        /* 隱藏霧效嘅 class，防止轉場時穿崩 */
        .center-fade-mask.hidden-fog {
            opacity: 0;
        }

        .nav-pill {
            background-color: var(--nav-bg);
            color: var(--text-color);
            padding: 0.5rem 1.2rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            height: 38px; 
        }
        .nav-pill:hover {
            background-color: var(--nav-hover-bg);
            color: var(--nav-hover-text);
        }

        .dynamic-logo {
            filter: var(--logo-filter);
            height: 1.2rem; 
        }
        @media (min-width: 768px) {
            .dynamic-logo {
                height: 1.6rem; 
            }
        }

        .hero-title {
            color: var(--text-color);
            z-index: 40;
            opacity: 0; 
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.8s forwards;
        }

        /* === Landing Animation Keyframes === */
        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        #intro-curtain {
            background-color: var(--bg-color);
            animation: fadeOut 1.2s ease forwards;
        }

        header {
            opacity: 0;
            animation: fadeDown 1s cubic-bezier(0.2, 0.8, 0.2, 1) 1.6s forwards;
        }

        .theme-toggle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background-color: var(--nav-bg);
            border: none;
            cursor: pointer;
            z-index: 60; 
        }
        .theme-toggle-btn:hover {
            background-color: var(--nav-hover-bg);
        }
        
        .theme-toggle-btn img {
            width: 18px;
            height: 18px;
            filter: var(--icon-filter);
        }
        
        .theme-toggle-btn:hover img {
            filter: var(--icon-hover-filter);
        }
    </style>
</head>
<body>
    
    <!-- 全新的獨立擴散層 -->
    <div id="theme-reveal-layer"></div>

    <div id="canvas-container">
        
        <!-- 進場動畫遮罩：用來呈現 3D 場景淡入效果 -->
        <div id="intro-curtain" class="absolute inset-0 pointer-events-none z-30"></div>

        <!-- Header -->
        <header class="absolute top-0 left-0 w-full px-8 pt-[15px] pb-8 flex justify-between items-center z-50">
            <div class="flex items-center gap-6 h-[38px]">
                <img src="./assets/3amDS.svg" alt="3amDS Logo" class="object-contain dynamic-logo" onerror="this.src='https://placehold.co/100x30?text=3amDS'">
            </div>
            <nav class="hidden md:flex gap-2 items-center h-[38px]">
                <div class="nav-pill">ABOUT</div>
                <div class="nav-pill">WORKS</div>
                <div class="nav-pill">CONTACT</div>
                
                <button id="themeToggleBtn" class="theme-toggle-btn ml-2" aria-label="Toggle Theme">
                    <img id="icon-img" src="./assets/Dark-mode.svg" alt="Toggle Theme" onerror="this.src='https://placehold.co/18x18/000000/FFFFFF?text=M'">
                </button>
            </nav>
        </header>

        <!-- 置中大標題 -->
        <div class="absolute inset-0 flex items-center justify-center z-40 pointer-events-none">
            <h1 class="hero-title text-4xl md:text-5xl lg:text-7xl xl:text-[80px] font-normal tracking-tight text-center px-4 leading-[1.1]">
                Hundreds of works,<br>
                <span>soul in every pixel.</span>
            </h1>
        </div>

        <div class="center-fade-mask"></div>

        <!-- 3D 場景容器 -->
        <div id="scene" class="absolute top-1/2 left-1/2 w-full h-full transform -translate-x-1/2 -translate-y-1/2 pointer-events-none z-10" style="transform-style: preserve-3d;"></div>

    </div>

    <script>
        // === Seamless Theme Toggle Logic ===
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const body = document.body;
        const iconImg = document.getElementById('icon-img');
        const revealLayer = document.getElementById('theme-reveal-layer');
        const fadeMask = document.querySelector('.center-fade-mask');
        let isAnimatingTheme = false;

        // 初始化狀態
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark');
            iconImg.src = './assets/Light-mode.svg';
        }

        themeToggleBtn.addEventListener('click', (e) => {
            if (isAnimatingTheme) return; 
            isAnimatingTheme = true;

            const isCurrentlyDark = body.classList.contains('dark');
            const targetColor = isCurrentlyDark ? '#F6F5F2' : '#000000';
            
            // 1. 鎖定底色：加入 class 確保動畫期間真正嘅 body 背景色唔會變
            body.classList.add('theme-transitioning');
            body.classList.add(isCurrentlyDark ? 'to-light' : 'to-dark');
            
            // 2. 解決「穿崩」：立即淡出中間嘅霧，等擴散圓圈去到中間時畫面係乾淨嘅
            fadeMask.classList.add('hidden-fog');

            // 攞掣嘅中心點
            const rect = themeToggleBtn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            // 計算最大半徑
            const maxRadius = Math.hypot(
                Math.max(x, window.innerWidth - x),
                Math.max(y, window.innerHeight - y)
            );

            // 設定 reveal layer 嘅變數同顏色
            revealLayer.style.setProperty('--x', `${x}px`);
            revealLayer.style.setProperty('--y', `${y}px`);
            revealLayer.style.setProperty('--radius', `${maxRadius}px`);
            revealLayer.style.backgroundColor = targetColor;

            // 啟動 1.5s 擴散動畫
            revealLayer.classList.add('expanding');

            // 3. 喺 750ms (動畫去到一半，圓圈掃過中間文字) 改變文字同 Icon 顏色
            setTimeout(() => {
                body.classList.toggle('dark');
                const isNowDark = body.classList.contains('dark');
                iconImg.src = isNowDark ? './assets/Light-mode.svg' : './assets/Dark-mode.svg';
                localStorage.setItem('theme', isNowDark ? 'dark' : 'light');
            }, 750); 

            // 4. 喺 1500ms (擴散圓圈完全覆蓋全螢幕) 進行清理工作
            setTimeout(() => {
                revealLayer.classList.remove('expanding');
                body.classList.remove('theme-transitioning', 'to-light', 'to-dark');
                
                // 重新淡入新顏色嘅霧
                fadeMask.classList.remove('hidden-fog'); 
                
                isAnimatingTheme = false;
            }, 1500);
        });


        // === 3D Animation Logic (完全唔受干擾，繼續無縫運行) ===
        const scene = document.getElementById('scene');
        
        const imageUrls = [
            'https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1592928302636-c83cf1e1c887?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1538688525198-9b88f6f53126?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=800&h=600&fit=crop',
            'https://images.unsplash.com/photo-1540932239986-30128078f3c5?w=800&h=600&fit=crop'
        ];

        const numImages = 31; 
        const particles = [];
        
        const zStart = -4500;
        const zEnd = 850; 
        const totalDepth = zEnd - zStart;

        for (let i = 0; i < numImages; i++) {
            const img = document.createElement('img');
            img.src = imageUrls[i % imageUrls.length];
            img.className = 'image-plane';
            initParticle(img, true, i);
            scene.appendChild(img);
        }

        function initParticle(img, isFirstLoad = false, index = 0) {
            const angle = (index / numImages) * Math.PI * 2 + ((Math.random() - 0.5) * 0.6);
            const radius = 1200 + Math.random() * 2500; 
            const x = Math.cos(angle) * radius; 
            const y = Math.sin(angle) * radius;

            let initialZ = isFirstLoad ? zStart + (Math.random() * totalDepth) : zStart;
            const speedZ = 5.704 + Math.random() * 8.551; 
            const scale = 0.6 + Math.random() * 0.3;

            const p = {
                el: img,
                x: x,      
                y: y,      
                z: initialZ,
                speedZ: speedZ,
                scale: scale,
                index: index 
            };

            if (isFirstLoad) {
                particles.push(p);
            } else {
                return p;
            }
        }

        function animate() {
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.z += p.speedZ; 

                if (p.z > zEnd) {
                    Object.assign(p, initParticle(p.el, false, p.index));
                }

                let opacity = 1;
                if (p.z < -3500) {
                    opacity = (p.z - zStart) / 1000;
                } else if (p.z > 500) {
                    opacity = Math.max(0, 1 - ((p.z - 500) / 350));
                }
                
                p.el.style.opacity = opacity * 0.95; 
                p.el.style.transform = `translate(-50%, -50%) translate3d(${p.x}px, ${p.y}px, ${p.z}px) scale(${p.scale})`;
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
